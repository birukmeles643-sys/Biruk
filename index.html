<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> ቅዳ እኔን እርጥብ ለመጋበዝ ፍቃደኛ ነህ ?</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#ffd6e7,#ffeef5);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    text-align:center;
    background:white;
    padding:30px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    max-width:400px;
}

img{
    width:180px;
    border-radius:20px;
    margin-bottom:15px;
}

h1{
    color:#ff4f8b;
    margin-bottom:20px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:15px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
}

#yesBtn{
    background:#ff4f8b;
    color:white;
}

#noBtn{
    background:#ddd;
    position:absolute;
}

.heart{
    position:absolute;
    font-size:25px;
    animation:float 4s linear forwards;
}

@keyframes float{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-600px);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="container">
    <img src="caty1.png" alt="pleas">

    <h1>🌸 እርጥብ ትጋብዘኛለህ ? 🌸</h1>

    <div class="buttons">
        <button id="yesBtn">አዎ 💕</button>
    </div>
</div>

<button id="noBtn"> እግር ብላ 🙈</button>

<script>

const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
    noBtn.style.left =
        Math.random() * (window.innerWidth - 100) + "px";

    noBtn.style.top =
        Math.random() * (window.innerHeight - 60) + "px";
});

document.getElementById("yesBtn").addEventListener("click", () => {

    document.body.innerHTML = `
        <div style="
        text-align:center;
        color:#ff4f8b;
        ">
            <h1>❤️ wait YOU SAID YES? ❤️</h1>
            <img src="cat-kitty.mp4" alt="happy">
            <h1> እግር ብላ ምትል መስሎኝ ነበር 🥹</h1>
            
            <h2> የምትጋብዝበት ቀን ...</h2>
            <h1 id="countdown"></h1>

            <br>

            <a href="https://instagram.com/"
            target="_blank">
                <button style="
                background:#ff4f8b;
                color:white;
                padding:12px 25px;
                border:none;
                border-radius:30px;
                font-size:18px;
                ">
                Message Me 😁💕
                </button>
            </a>
        </div>
    `;

    for(let i=0;i<50;i++){
        let heart=document.createElement("div");
        heart.innerHTML="❤️";
        heart.classList.add("heart");
        heart.style.left=Math.random()*100+"vw";
        heart.style.top="100vh";
        heart.style.fontSize=(20+Math.random()*30)+"px";
        document.body.appendChild(heart);

        setTimeout(()=>{
            heart.remove();
        },4000);
    }

    const targetDate =
        new Date("2026-06-2 22:20:00").getTime();

    const timer = setInterval(() => {

        const now = new Date().getTime();
        const distance = targetDate - now;

        const days =
        Math.floor(distance/(1000*60*60*24));

        const hours =
        Math.floor((distance%(1000*60*60*24))
        /(1000*60*60));

        const minutes =
        Math.floor((distance%(1000*60*60))
        /(1000*60));

        const seconds =
        Math.floor((distance%(1000*60))/1000);

        document.getElementById("countdown")
        .innerHTML =
        `${01}d ${1}h ${00}m ${49}s`;

        if(distance < 0){
            clearInterval(timer);
            document.getElementById("countdown")
            .innerHTML =
            "🎉 IT'S እርጥብ TIME!<br>😼 🎉;"
        }
    },1000);

});

</script>
</body>
  </html>
